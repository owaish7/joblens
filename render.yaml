# Render Blueprint — deploy with: New + -> Blueprint -> connect this repo.
# Render reads this file and provisions the service automatically.
services:
  - type: web
    name: joblens
    runtime: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # you paste this in the Render dashboard (kept secret)
      - key: GEN_MODEL
        value: gemini-2.5-flash
      - key: EMBED_MODEL
        value: gemini-embedding-001
